data:
  dataset_path: data/LibriTTS
  crop_length: 16384 # ~0.68 s at 24 kHz (paper §3)
  batch_size: 16
  num_workers: 4
  val_split: 0.05

model:
  sample_rate: 24000
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mels: 100
  fmin: 0.0
  fmax: 12000.0

  generator:
    class_path: src.model.Vocos
    init_args:
      in_channels: 100
      channels: 512
      hidden_channels: 1536
      out_channels: 1026 # 2 * (n_fft // 2 + 1) = 2 * 513
      num_layers: 8

  discriminator:
    class_path: src.discriminator.Discriminator
    init_args: {}

  # optimizer (AdamW, paper §3)
  lr: 2.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.01

  # loss weights
  lambda_mel: 45.0
  lambda_feat: 2.0
  lambda_adv: 1.0
  grad_clip: 1.0

trainer:
  max_steps: 200000
  precision: 16-mixed
  log_every_n_steps: 10
  check_val_every_n_epoch: null
  val_check_interval: 10000
